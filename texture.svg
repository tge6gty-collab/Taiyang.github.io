<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Mucha radial halo: concentric arcs + spokes, pure geometry only -->
  <g transform="translate(100,100)">
    <!-- Concentric rings -->
    <circle r="22" fill="none" stroke="#d4960a" stroke-width="1.1" opacity="0.28"/>
    <circle r="42" fill="none" stroke="#d4960a" stroke-width="0.75" opacity="0.22"/>
    <circle r="62" fill="none" stroke="#d4960a" stroke-width="0.6" opacity="0.18"/>
    <circle r="82" fill="none" stroke="#d4960a" stroke-width="0.5" opacity="0.14"/>
    <circle r="100" fill="none" stroke="#d4960a" stroke-width="0.4" opacity="0.11"/>
    <!-- Cardinal spokes -->
    <line x1="0" y1="-26" x2="0" y2="-98" stroke="#d4960a" stroke-width="0.6" opacity="0.2"/>
    <line x1="0"  y1="26"  x2="0"  y2="98"  stroke="#d4960a" stroke-width="0.6" opacity="0.2"/>
    <line x1="-26" y1="0" x2="-98" y2="0" stroke="#d4960a" stroke-width="0.6" opacity="0.2"/>
    <line x1="26"  y1="0" x2="98"  y2="0" stroke="#d4960a" stroke-width="0.6" opacity="0.2"/>
    <!-- Diagonal spokes -->
    <line x1="16" y1="-16" x2="69" y2="-69" stroke="#d4960a" stroke-width="0.4" opacity="0.15"/>
    <line x1="-16" y1="-16" x2="-69" y2="-69" stroke="#d4960a" stroke-width="0.4" opacity="0.15"/>
    <line x1="16" y1="16" x2="69" y2="69" stroke="#d4960a" stroke-width="0.4" opacity="0.15"/>
    <line x1="-16" y1="16" x2="-69" y2="69" stroke="#d4960a" stroke-width="0.4" opacity="0.15"/>
    <!-- Tick marks at outer ring -->
    <line x1="0" y1="-78" x2="0" y2="-85" stroke="#d4960a" stroke-width="0.9" opacity="0.28"/>
    <line x1="0" y1="78" x2="0" y2="85" stroke="#d4960a" stroke-width="0.9" opacity="0.28"/>
    <line x1="-78" y1="0" x2="-85" y2="0" stroke="#d4960a" stroke-width="0.9" opacity="0.28"/>
    <line x1="78" y1="0" x2="85" y2="0" stroke="#d4960a" stroke-width="0.9" opacity="0.28"/>
    <!-- Center dot -->
    <circle r="3.5" fill="#d4960a" opacity="0.3"/>
  </g>
  <!-- Midpoint accent dots -->
  <circle cx="100" cy="16" r="3.2" fill="#d4960a" opacity="0.22"/>
  <circle cx="100" cy="184" r="3.2" fill="#d4960a" opacity="0.22"/>
  <circle cx="16"  cy="100" r="3.2" fill="#d4960a" opacity="0.22"/>
  <circle cx="184" cy="100" r="3.2" fill="#d4960a" opacity="0.22"/>
</svg>
